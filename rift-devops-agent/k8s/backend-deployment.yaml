"""
Kubernetes Deployment for RIFT DevOps Agent Backend
"""

apiVersion: apps/v1
kind: Deployment
metadata:
  name: rift-backend
  namespace: rift-devops-agent
  labels:
    app: rift-backend
spec:
  replicas: 1
  selector:
    matchLabels:
      app: rift-backend
  template:
    metadata:
      labels:
        app: rift-backend
    spec:
      containers:
        - name: backend
          image: rift-devops-agent/backend:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8000
              name: http
          env:
            - name: OPENAI_API_KEY
              valueFrom:
                secretKeyRef:
                  name: rift-secrets
                  key: openai-api-key
            - name: GITHUB_TOKEN
              valueFrom:
                secretKeyRef:
                  name: rift-secrets
                  key: github-token
            - name: DEBUG
              value: "false"
            - name: LOG_LEVEL
              value: "INFO"
            - name: MAX_ITERATIONS
              value: "5"
            - name: DATABASE_URL
              value: "sqlite:///app/data/rift_agent.db"
            - name: CHROMA_DB_PATH
              value: "/app/data/chroma_db"
          volumeMounts:
            - name: data
              mountPath: /app/data
            - name: tmp-repos
              mountPath: /tmp/rift-repos
            - name: tmp-results
              mountPath: /tmp/rift-results
          resources:
            requests:
              memory: "512Mi"
              cpu: "500m"
            limits:
              memory: "2Gi"
              cpu: "2000m"
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 30
            periodSeconds: 30
            timeoutSeconds: 10
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: rift-backend-data
        - name: tmp-repos
          emptyDir: {}
        - name: tmp-results
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: rift-backend
  namespace: rift-devops-agent
  labels:
    app: rift-backend
spec:
  selector:
    app: rift-backend
  ports:
    - port: 8000
      targetPort: 8000
      name: http
  type: ClusterIP
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: rift-backend-data
  namespace: rift-devops-agent
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 10Gi
