"""
Kubernetes Deployment for RIFT DevOps Agent Frontend
"""

apiVersion: apps/v1
kind: Deployment
metadata:
  name: rift-frontend
  namespace: rift-devops-agent
  labels:
    app: rift-frontend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: rift-frontend
  template:
    metadata:
      labels:
        app: rift-frontend
    spec:
      containers:
        - name: frontend
          image: rift-devops-agent/frontend:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 80
              name: http
          env:
            - name: VITE_API_URL
              value: "http://rift-backend:8000"
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "512Mi"
              cpu: "500m"
          livenessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 10
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
---
apiVersion: v1
kind: Service
metadata:
  name: rift-frontend
  namespace: rift-devops-agent
  labels:
    app: rift-frontend
spec:
  selector:
    app: rift-frontend
  ports:
    - port: 80
      targetPort: 80
      name: http
  type: ClusterIP
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: rift-frontend
  namespace: rift-devops-agent
  annotations:
    nginx.ingress.kubernetes.io/rewrite-target: /
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
spec:
  ingressClassName: nginx
  rules:
    - host: rift-devops-agent.local
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: rift-frontend
                port:
                  number: 80
