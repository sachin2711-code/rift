"""
Kubernetes Secrets for RIFT DevOps Agent
NOTE: Replace base64 encoded values with your actual secrets
"""

apiVersion: v1
kind: Secret
metadata:
  name: rift-secrets
  namespace: rift-devops-agent
type: Opaque
data:
  # echo -n 'your-openai-api-key' | base64
  openai-api-key: <BASE64_ENCODED_OPENAI_API_KEY>
  # echo -n 'your-github-token' | base64
  github-token: <BASE64_ENCODED_GITHUB_TOKEN>
